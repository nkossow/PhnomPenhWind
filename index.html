<title>Phnom Penh Urban Climate — Wind Animation v2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #080c16;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #e0e8f0;
    overflow: hidden;
  }
  h1 {
    font-size: 1rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    color: #8ec8e8;
    font-weight: 300;
  }
  #container {
    position: relative;
    display: inline-block;
  }
  #mapImg {
    display: block;
    max-width: 96vw;
    max-height: 89vh;
    border-radius: 4px;
    box-shadow: 0 0 40px rgba(100,180,255,0.12);
  }
  #windCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  #controls {
    position: absolute;
    bottom: 10px; left: 10px;
    background: rgba(8,12,22,0.88);
    border: 1px solid rgba(140,200,232,0.25);
    border-radius: 8px;
    padding: 7px 12px;
    display: flex; gap: 14px;
    align-items: center;
    font-size: 0.7rem;
    z-index: 10;
    pointer-events: auto;
  }
  #controls label {
    display: flex; align-items: center; gap: 5px;
    color: #8ec8e8;
  }
  #controls input[type="range"] {
    width: 70px; accent-color: #8ec8e8;
  }
  .legend {
    position: absolute;
    top: 10px; left: 10px;
    background: rgba(8,12,22,0.88);
    border: 1px solid rgba(140,200,232,0.25);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.65rem;
    z-index: 10;
    line-height: 1.6;
  }
  .legend div {
    display: flex; align-items: center; gap: 6px; margin: 2px 0;
  }
  .legend .dot {
    width: 22px; height: 3px; border-radius: 2px; flex-shrink: 0;
  }
</style>
</head>

<script>
const img = document.getElementById("mapImg");
const canvas = document.getElementById("windCanvas");
const ctx = canvas.getContext("2d");

let W, H;
let particles = [];
let speedMul = 1;
let particleCount = 1200;
let globalOpacity = 0.55;

// Map boundary: the actual climate map occupies roughly left 70% of image
const MAP_RIGHT = 0.70;

function initSize() {
  const rect = img.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width = W + "px";
  canvas.style.height = H + "px";
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}

// === RIVER GEOMETRY ===
// Tonle Sap river path (left river), normalized coords on full image
// Runs from upper-center down through center, curving west
function tonleSapX(ny) {
  // River x position as function of y (top to bottom)
  if (ny < 0.05) return 0.42;
  if (ny < 0.20) return 0.42 - (ny - 0.05) * 0.1;
  if (ny < 0.40) return 0.405 - (ny - 0.20) * 0.15;
  if (ny < 0.55) return 0.375 - (ny - 0.40) * 0.2;
  return 0.345 - (ny - 0.55) * 0.15;
}

// Mekong river (right river) - straighter, runs N-S with slight westward bend
function mekongX(ny) {
  if (ny < 0.10) return 0.48;
  if (ny < 0.35) return 0.48 - (ny - 0.10) * 0.08;
  if (ny < 0.55) return 0.46 - (ny - 0.35) * 0.12;
  return 0.436 - (ny - 0.55) * 0.06;
}

// Distance to nearest river
function distToRiver(nx, ny) {
  const dTonle = Math.abs(nx - tonleSapX(ny));
  const dMekong = Math.abs(nx - mekongX(ny));
  return Math.min(dTonle, dMekong);
}

function nearestRiverDir(nx, ny) {
  const dTonle = Math.abs(nx - tonleSapX(ny));
  const dMekong = Math.abs(nx - mekongX(ny));
  // River tangent direction (roughly N-S but following river curve)
  // Tonle Sap curves more, Mekong is straighter
  if (dTonle < dMekong) {
    // Tonle Sap - compute local tangent
    const dy = 0.01;
    const x1 = tonleSapX(Math.max(0, ny - dy));
    const x2 = tonleSapX(Math.min(1, ny + dy));
    const dx = x2 - x1;
    const mag = Math.sqrt(dx * dx + (2 * dy) * (2 * dy));
    return [dx / mag, (2 * dy) / mag]; // tangent direction (going south)
  } else {
    const dy = 0.01;
    const x1 = mekongX(Math.max(0, ny - dy));
    const x2 = mekongX(Math.min(1, ny + dy));
    const dx = x2 - x1;
    const mag = Math.sqrt(dx * dx + (2 * dy) * (2 * dy));
    return [dx / mag, (2 * dy) / mag];
  }
}

// === ZONE DETECTION ===
// Heat island center (orange/pink zone)
function heatIntensity(nx, ny) {
  // Main heat island: centered around (0.33, 0.55) to (0.42, 0.75)
  const cx = 0.36, cy = 0.62;
  const dx = (nx - cx) / 0.12;
  const dy = (ny - cy) / 0.18;
  const d = Math.sqrt(dx * dx + dy * dy);
  return Math.max(0, 1 - d);
}

// Main air path zone (hatched area in south)
function mainAirPathZone(nx, ny) {
  // Hatched area covers roughly: x=0.15-0.50, y=0.65-0.95
  // with stronger presence in southwest
  if (ny < 0.55 || nx > 0.55) return 0;
  const strength = Math.min(1, (ny - 0.55) / 0.25) * Math.min(1, (0.55 - nx) / 0.15);
  return Math.max(0, strength);
}

// Good ventilation zone (lighter hatching, west/northwest)
function goodVentZone(nx, ny) {
  // Covers western and northern parts of map
  if (nx > 0.45) return 0;
  if (ny > 0.55) return 0;
  return Math.max(0, (0.45 - nx) / 0.3 * (0.55 - ny) / 0.4);
}

// === FLOW FIELD ===
// Based on observed arrows:
// - General wind: SW → NE (~40-45° from horizontal)
// - River corridors: bidirectional N-S (ventilation)
// - Main air paths: enhanced SW → NE
// - Heat island: turbulent, reduced flow

function getFlow(nx, ny) {
  const t = performance.now() * 0.0002;
  
  // Base wind: SW to NE direction (~42° angle)
  // In screen coords: positive x (east) and negative y (north)
  const windAngle = 42 * Math.PI / 180;
  let baseVx = Math.cos(windAngle) * 0.8;  // eastward component
  let baseVy = -Math.sin(windAngle) * 0.8;  // northward component (negative = up)
  
  let vx = baseVx;
  let vy = baseVy;
  let speedFactor = 1.0;
  
  // --- River ventilation corridors ---
  const dRiver = distToRiver(nx, ny);
  const riverWidth = 0.035;
  if (dRiver < riverWidth) {
    const riverStrength = Math.pow(1 - dRiver / riverWidth, 1.5);
    const [rdx, rdy] = nearestRiverDir(nx, ny);
    
    // Bidirectional: alternate direction based on time for visual effect
    // but primarily flow south (downstream) with oscillation
    const oscillation = Math.sin(t * 2 + ny * 15) * 0.4;
    const riverVx = rdx * (1 + oscillation);
    const riverVy = rdy * (1 + oscillation);
    
    vx = vx * (1 - riverStrength * 0.8) + riverVx * 1.5 * riverStrength;
    vy = vy * (1 - riverStrength * 0.8) + riverVy * 1.5 * riverStrength;
    speedFactor = 1.0 + riverStrength * 0.8;
  }
  
  // --- Main air paths zone (south) ---
  const mapStrength = mainAirPathZone(nx, ny);
  if (mapStrength > 0) {
    // Enhanced SW→NE flow, ~45°
    vx += Math.cos(45 * Math.PI / 180) * 0.6 * mapStrength;
    vy += -Math.sin(45 * Math.PI / 180) * 0.6 * mapStrength;
    speedFactor += mapStrength * 0.4;
  }
  
  // --- Good ventilation zone (west/north) ---
  const gvStrength = goodVentZone(nx, ny);
  if (gvStrength > 0) {
    // SW→NE, slightly more eastward  
    vx += Math.cos(38 * Math.PI / 180) * 0.3 * gvStrength;
    vy += -Math.sin(38 * Math.PI / 180) * 0.3 * gvStrength;
    speedFactor += gvStrength * 0.2;
  }
  
  // --- Heat island effect ---
  const heatStr = heatIntensity(nx, ny);
  if (heatStr > 0) {
    // Turbulence and reduced main flow, thermal mixing
    const turb = heatStr * 0.5;
    vx += Math.sin(ny * 25 + t * 4) * turb;
    vy += Math.cos(nx * 25 + t * 3.5) * turb;
    // Slightly reduce base speed in heat island (less ventilation)
    speedFactor *= (1 - heatStr * 0.3);
    // Slight convergence toward center (thermal updraft)
    vx += (0.36 - nx) * heatStr * 0.3;
    vy += (0.62 - ny) * heatStr * 0.2;
  }
  
  // --- Subtle turbulence everywhere ---
  vx += Math.sin(nx * 18 + ny * 12 + t * 1.5) * 0.08;
  vy += Math.cos(nx * 12 + ny * 18 + t * 1.8) * 0.08;
  
  // Normalize and return with speed info
  const mag = Math.sqrt(vx * vx + vy * vy) || 1;
  return [vx / mag, vy / mag, speedFactor * mag];
}

// === PARTICLE COLORS ===
function getParticleColor(nx, ny) {
  const dRiver = distToRiver(nx, ny);
  const heatStr = heatIntensity(nx, ny);
  const mapStr = mainAirPathZone(nx, ny);
  
  // River corridor particles
  if (dRiver < 0.035) {
    return [120, 200, 255]; // bright blue
  }
  // Heat zone
  if (heatStr > 0.4) {
    return [255, 200, 100]; // warm orange-gold
  }
  if (heatStr > 0.15) {
    const t = (heatStr - 0.15) / 0.25;
    return [
      180 + t * 75,
      240 - t * 40,
      200 - t * 100
    ];
  }
  // Main air paths
  if (mapStr > 0.2) {
    return [220, 220, 255]; // light blue-white
  }
  // Default cooling zone
  return [180, 240, 200]; // soft green
}

// === MAP BOUNDARY ===
// Approximate boundary of the climate map overlay
function isInMapArea(nx, ny) {
  if (nx > MAP_RIGHT || nx < 0.02) return false;
  if (ny < 0.02 || ny > 0.98) return false;
  
  // Rough boundary shape
  // Top: indented on left
  if (ny < 0.15 && nx < 0.25) return false;
  if (ny < 0.08 && nx < 0.35) return false;
  
  // Left side curves
  if (nx < 0.06 + ny * 0.02) return false;
  
  // Bottom
  if (ny > 0.90 && nx < 0.15) return false;
  
  return true;
}

// === PARTICLE CLASS ===
class Particle {
  constructor() {
    this.reset(true);
  }
  reset(randomAge = false) {
    // Spawn biased toward interesting zones
    let attempts = 0;
    do {
      const r = Math.random();
      if (r < 0.2) {
        // Near rivers
        const ry = Math.random();
        const riverX = Math.random() < 0.5 ? tonleSapX(ry) : mekongX(ry);
        this.nx = riverX + (Math.random() - 0.5) * 0.06;
        this.ny = ry;
      } else if (r < 0.35) {
        // Heat zone
        this.nx = 0.28 + Math.random() * 0.16;
        this.ny = 0.48 + Math.random() * 0.3;
      } else if (r < 0.5) {
        // Main air paths south
        this.nx = 0.10 + Math.random() * 0.40;
        this.ny = 0.65 + Math.random() * 0.30;
      } else {
        // General map area
        this.nx = 0.05 + Math.random() * 0.62;
        this.ny = Math.random() * 0.95;
      }
      attempts++;
    } while (!isInMapArea(this.nx, this.ny) && attempts < 20);
    
    this.x = this.nx * W;
    this.y = this.ny * H;
    this.age = randomAge ? Math.floor(Math.random() * 100) : 0;
    this.maxAge = 80 + Math.random() * 100;
    this.speed = 0.5 + Math.random() * 0.7;
    this.history = [];
    this.histLen = 10 + Math.floor(Math.random() * 15);
  }
  update() {
    this.nx = this.x / W;
    this.ny = this.y / H;
    
    if (!isInMapArea(this.nx, this.ny) || this.age > this.maxAge) {
      this.reset(false);
      return;
    }
    
    const [fx, fy, fmag] = getFlow(this.nx, this.ny);
    const sp = this.speed * speedMul * (0.5 + fmag * 0.5);
    
    this.history.push({ x: this.x, y: this.y });
    if (this.history.length > this.histLen) this.history.shift();
    
    this.x += fx * sp * 1.2;
    this.y += fy * sp * 1.2;
    this.age++;
  }
  draw() {
    if (this.history.length < 2) return;
    
    const [r, g, b] = getParticleColor(this.nx, this.ny);
    const lifeFrac = this.age / this.maxAge;
    const fade = lifeFrac < 0.12 ? lifeFrac / 0.12 
               : lifeFrac > 0.75 ? (1 - lifeFrac) / 0.25 
               : 1;
    const alpha = fade * globalOpacity;
    
    // Draw trail with gradient
    for (let i = 1; i < this.history.length; i++) {
      const segAlpha = alpha * (i / this.history.length) * 0.5;
      ctx.beginPath();
      ctx.moveTo(this.history[i - 1].x, this.history[i - 1].y);
      ctx.lineTo(this.history[i].x, this.history[i].y);
      ctx.strokeStyle = `rgba(${r},${g},${b},${segAlpha})`;
      ctx.lineWidth = 0.8 + (i / this.history.length) * 0.8;
      ctx.stroke();
    }
    
    // Line from last history to current
    if (this.history.length > 0) {
      const last = this.history[this.history.length - 1];
      ctx.beginPath();
      ctx.moveTo(last.x, last.y);
      ctx.lineTo(this.x, this.y);
      ctx.strokeStyle = `rgba(${r},${g},${b},${alpha * 0.7})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
    
    // Bright head dot
    ctx.beginPath();
    ctx.arc(this.x, this.y, 1.4, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${Math.min(255, r + 40)},${Math.min(255, g + 40)},${Math.min(255, b + 40)},${alpha * 0.9})`;
    ctx.fill();
  }
}

function initParticles() {
  particles = [];
  for (let i = 0; i < particleCount; i++) {
    particles.push(new Particle());
  }
}

function animate() {
  ctx.clearRect(0, 0, W, H);
  
  for (const p of particles) {
    p.update();
    p.draw();
  }
  
  requestAnimationFrame(animate);
}

img.onload = () => {
  initSize();
  initParticles();
  animate();
};

if (img.complete) {
  initSize();
  initParticles();
  animate();
}

window.addEventListener("resize", () => {
  initSize();
});

document.getElementById("speedSlider").addEventListener("input", (e) => {
  speedMul = parseFloat(e.target.value);
});

document.getElementById("countSlider").addEventListener("input", (e) => {
  particleCount = parseInt(e.target.value);
  initParticles();
});

document.getElementById("opacitySlider").addEventListener("input", (e) => {
  globalOpacity = parseFloat(e.target.value);
});
</script>
</body>
</html>
